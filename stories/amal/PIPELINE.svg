<text x="1250.5" y="596" text-anchor="middle" font-size="16" font-weight="bold" fill="#143">show-not-tell</text>
<text x="1250.5" y="620" text-anchor="middle" font-size="12.5" fill="#555">no state a camera can't see</text>
