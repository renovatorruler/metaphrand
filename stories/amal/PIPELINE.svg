<text x="347.5" y="720" text-anchor="middle" font-size="12.5" fill="#555">no skeletal / un-lived</text>
<rect x="506" y="662" width="285" height="84" rx="9" fill="#e2f0d9" stroke="#9aa" stroke-width="1.2"/>
<text x="648.5" y="696" text-anchor="middle" font-size="16" font-weight="bold" fill="#143">concreteness</text>
<text x="648.5" y="720" text-anchor="middle" font-size="12.5" fill="#555">physical · ~0% flowery</text>
<rect x="807" y="662" width="285" height="84" rx="9" fill="#e2f0d9" stroke="#9aa" stroke-width="1.2"/>
<text x="949.5" y="696" text-anchor="middle" font-size="16" font-weight="bold" fill="#143">clear-pane</text>
