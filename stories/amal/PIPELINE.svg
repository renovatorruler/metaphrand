<text x="347.5" y="520" text-anchor="middle" font-size="12.5" fill="#555">want · wall · turn</text>
<rect x="506" y="462" width="285" height="84" rx="9" fill="#e2f0d9" stroke="#9aa" stroke-width="1.2"/>
<text x="648.5" y="496" text-anchor="middle" font-size="16" font-weight="bold" fill="#143">human-reaction</text>
<text x="648.5" y="520" text-anchor="middle" font-size="12.5" fill="#555">real, not a plot function</text>
