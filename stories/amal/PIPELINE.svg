<text x="800.0" y="144" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">THE SEED  —  the scaffolding</text>
<text x="800.0" y="168" text-anchor="middle" font-size="13" fill="#333">want · wall · turn · beats   |   voice cards   |   held cards · canon</text>
<line x1="800" y1="196" x2="800" y2="236" stroke="#555" stroke-width="2.4" marker-end="url(#a)"/>
<rect x="490" y="238" width="620" height="84" rx="12" fill="#d6e8ff" stroke="#999" stroke-width="1.5"/>
<text x="800.0" y="270" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">AUTHOR</text>
<text x="800.0" y="294" text-anchor="middle" font-size="13" fill="#333">claude -p   (headless Claude, no API key)   —   drafts from the seed</text>
<line x1="800" y1="322" x2="800" y2="364" stroke="#555" stroke-width="2.4" marker-end="url(#a)"/>
<rect x="180" y="366" width="1240" height="536" rx="14" fill="#f4f4f4" stroke="#777" stroke-width="1.8"/>
<text x="800" y="400" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">GATE BATTERY   —   passes.py / run_scene.py</text>
<text x="800" y="422" text-anchor="middle" font-size="13" fill="#666" font-style="italic">repair(): the draft runs every box below — test → fix → re-test, pass by pass</text>
<text x="205" y="452" font-size="15" font-weight="bold" fill="#2a7d2a">twelve LLM-critic passes · claude -p   (each: test → fix → re-test)</text>
<rect x="205" y="462" width="285" height="84" rx="9" fill="#e2f0d9" stroke="#9aa" stroke-width="1.2"/>
