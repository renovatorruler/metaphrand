<text x="800.0" y="1218" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">PRODUCTION — cinema/ engine</text>
<text x="800.0" y="1242" text-anchor="middle" font-size="13" fill="#333">audio (ElevenLabs) → frames (Gemini) → score</text>
<text x="800.0" y="1263" text-anchor="middle" font-size="13" fill="#333">→ assemble (master · title · transitions) → YouTube</text>
<text x="800" y="1418" text-anchor="middle" font-size="16" font-weight="bold" fill="#444">a scene exists only if it came through the battery   ·   the human is the stop</text>
