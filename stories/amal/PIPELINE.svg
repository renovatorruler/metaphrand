<text x="648.5" y="846" text-anchor="middle" font-size="12.5" fill="#555">verbless fragments</text>
<rect x="807" y="788" width="285" height="84" rx="9" fill="#fdead0" stroke="#9aa" stroke-width="1.2"/>
<text x="949.5" y="822" text-anchor="middle" font-size="16" font-weight="bold" fill="#143">cultural_gate</text>
<text x="949.5" y="846" text-anchor="middle" font-size="12.5" fill="#555">ritual-doc check</text>
