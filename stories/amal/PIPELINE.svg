<text x="800" y="58" text-anchor="middle" font-size="30" font-weight="bold" fill="#111">अमल · the writing-to-screen pipeline</text>
<text x="800" y="86" text-anchor="middle" font-size="15" fill="#777" font-style="italic">scaffolding the LLM uses, not LLM-based software — the local model enforces, Claude authors, code gates</text>
