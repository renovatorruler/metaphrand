<text x="949.5" y="496" text-anchor="middle" font-size="16" font-weight="bold" fill="#143">voice</text>
<text x="949.5" y="520" text-anchor="middle" font-size="12.5" fill="#555">names hidden — who speaks?</text>
<rect x="1108" y="462" width="285" height="84" rx="9" fill="#e2f0d9" stroke="#9aa" stroke-width="1.2"/>
<text x="1250.5" y="496" text-anchor="middle" font-size="16" font-weight="bold" fill="#143">dialogue-realism</text>
<text x="1250.5" y="520" text-anchor="middle" font-size="12.5" fill="#555">messy · halting · true</text>
