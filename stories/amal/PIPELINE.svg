<text x="1250.5" y="822" text-anchor="middle" font-size="16" font-weight="bold" fill="#143">naturalness · gemma3</text>
<text x="1250.5" y="846" text-anchor="middle" font-size="12.5" fill="#555">'arranged for effect' (advisory)</text>
